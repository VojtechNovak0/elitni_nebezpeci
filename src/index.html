<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Elitní Nebezpečí</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth overlay -->
    <div id="authOverlay" data-mode="login">
        <div id="authBox">
            <h1 id="authTitle">Přihlášení</h1>
            <div id="authForm">
                <input id="authUsername" type="text"     placeholder="Uživatelské jméno" autocomplete="username" />
                <input id="authPassword" type="password" placeholder="Heslo" autocomplete="current-password" />
                <button id="authSubmit">Přihlásit se</button>
            </div>
            <p id="authMessage"></p>
            <button id="authToggle">Nemáš účet? Registruj se</button>
        </div>
    </div>

    <canvas id="gameCanvas" style="display:none"></canvas>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <!-- Konfigurace ze serveru (klíče z .env) -->
    <script src="/js/env-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/input.js"></script>
    <script src="js/ship.js"></script>
    <script src="js/station.js"></script>
    <script src="js/aiship.js"></script>
    <script src="js/universe.js"></script>
    <script src="js/trading.js"></script>
    <script src="js/docking.js"></script>
    <script src="js/savegame.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/map.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        window.addEventListener('load', () => Auth.init());
    </script>
</body>
</html>
